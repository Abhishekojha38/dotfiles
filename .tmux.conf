# Use Ctrl-a as the prefix key (easier to reach than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support for resizing, scrolling, and selecting panes
set -g mouse on

# Start window and pane numbering at 1 (more natural than 0)
set -g base-index 1
set -g pane-base-index 1

# Split panes intuitively using | for vertical and - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use arrow keys to switch between panes
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Fast config reload using "Prefix + r"
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf!"

# Kill the current window using "Prefix + k"
unbind &
bind k kill-window

# --- Status Bar & Themeing ---
set -g status on
set -g status-position top
set -g status-interval 5
# Align the window tab list to the center (options: left, center, right)
set -g status-justify center

# Configure Right Status Side (Show Hostname and Time)
set -g status-right '#[bg=#313244,fg=#cdd6f4]    #H #[bg=#45475a,fg=#cdd6f4]    %H:%M '
set -g status-right-length 50

# Style Inactive Window Tabs
set -g window-status-format '#[fg=#6c7086,bg=#181825] #I:#W '

# Style Active Window Tab
set -g window-status-current-format '#[fg=#11111b,bg=#a6e3a1,bold] #I:#W    '

set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
