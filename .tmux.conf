# Use Ctrl-a as the prefix key (easier to reach than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse support for resizing, scrolling, and selecting panes
set -g mouse on

# Start window and pane numbering at 1 (more natural than 0)
set -g base-index 1
set -g pane-base-index 1

# Split panes intuitively using | for vertical and - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use Vim-style keys to switch between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Fast config reload using "Prefix + r"
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf!"

# --- Status Bar & Themeing ---
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left " #S "
set -g status-right " %Y-%m-%d %H:%M "
